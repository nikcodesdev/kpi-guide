<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#d95b00">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Видео по настройкам">
    <title>Видео по настройкам — ноутбуки HUAWEI, MSI и установка ПО на ТВ</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 20px;
        }

        .card {
            max-width: 1300px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: #d95b00;
            padding: 20px 28px;
            color: white;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .header-icon {
            font-size: 3rem;
        }

        .header h1 {
            margin: 0;
            font-size: 1.6rem;
            font-weight: 600;
        }

        .content {
            padding: 25px;
        }

        .videos-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: center;
        }

        .video-card {
            flex: 1;
            min-width: 300px;
            max-width: 380px;
            background: #fff;
            border-radius: 16px;
            border: 1px solid #e8e8e8;
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .video-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
            border-color: #f0d9cc;
        }

        .video-title {
            background: #fffaf5;
            padding: 14px 18px;
            font-weight: 700;
            font-size: 1.1rem;
            color: #d95b00;
            border-bottom: 2px solid #d95b00;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .video-title::before {
            content: "▶";
            font-size: 0.9rem;
            color: #d95b00;
        }

        .video-wrapper {
            background: #000;
            background-color: #0a0a0a;
            line-height: 0;
        }

        video {
            width: 100%;
            display: block;
            aspect-ratio: 16 / 9;
            object-fit: contain;
            cursor: pointer;
        }

        @media (max-width: 700px) {
            .content {
                padding: 15px;
            }
            .header {
                padding: 16px 20px;
            }
            .header h1 {
                font-size: 1.3rem;
            }
            .video-title {
                padding: 10px 14px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
<div class="card">
    <div class="header">
        <div class="header-icon">📺</div>
        <div>
            <h1>Видео по настройкам</h1>
        </div>
    </div>
    <div class="content">
        <div class="videos-grid">
            <!-- Ноутбуки HUAWEI -->
            <div class="video-card">
                <div class="video-title">Ноутбуки HUAWEI</div>
                <div class="video-wrapper">
                    <video preload="metadata" controls>
                        <source src="huawei_notebooks.mp4" type="video/mp4">
                        Ваш браузер не поддерживает тег video.
                    </video>
                </div>
            </div>

            <!-- Ноутбуки MSI -->
            <div class="video-card">
                <div class="video-title">Ноутбуки MSI</div>
                <div class="video-wrapper">
                    <video preload="metadata" controls>
                        <source src="msi_notebooks.mp4" type="video/mp4">
                        Ваш браузер не поддерживает тег video.
                    </video>
                </div>
            </div>

            <!-- Установка ПО на ТВ -->
            <div class="video-card">
                <div class="video-title">Установка ПО на ТВ</div>
                <div class="video-wrapper">
                    <video preload="metadata" controls>
                        <source src="tv_software_install.mp4" type="video/mp4">
                        Ваш браузер не поддерживает тег video.
                    </video>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        const videos = document.querySelectorAll('video');
        videos.forEach(video => {
            video.addEventListener('error', (e) => {
                const parentCard = video.closest('.video-card');
                const titleElem = parentCard ? parentCard.querySelector('.video-title') : null;
                const videoName = titleElem ? titleElem.innerText.trim() : 'Видео';
                console.warn(`⚠️ Ошибка загрузки: "${videoName}". Проверьте, что файл загружен в ту же папку, что и эта страница.`);
            });
        });
    })();
</script>
</body>
</html>
