<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#d95b00">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Видео по настройкам">
    <title>Видео по настройкам — ноутбуки HUAWEI, MSI и установка ПО на ТВ</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 20px;
        }

        /* Главная карточка — стиль как в примере */
        .card {
            max-width: 1300px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        /* Шапка с оранжевым фоном и иконкой */
        .header {
            background: #d95b00;
            padding: 20px 28px;
            color: white;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .header-icon {
            font-size: 3rem;
        }

        .header h1 {
            margin: 0;
            font-size: 1.6rem;
            font-weight: 600;
        }

        /* Блок-подсказка про BIOS — стилизован под лёгкое уведомление */
        .bios-note {
            background: #fff2e6;
            margin: 0 25px 20px 25px;
            padding: 12px 18px;
            border-radius: 16px;
            border-left: 5px solid #d95b00;
            color: #3a2c21;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }
        .bios-note span:first-child {
            font-size: 1.2rem;
        }
        .bios-note strong {
            color: #d95b00;
            font-weight: 700;
        }
        .bios-note code {
            background: #fff0e4;
            padding: 2px 8px;
            border-radius: 30px;
            font-family: monospace;
            font-size: 0.8rem;
            color: #b34a00;
        }

        /* Контентная область */
        .content {
            padding: 0 25px 25px 25px;
        }

        /* Сетка для трёх видео (блоки как в примере, но видео-карточки) */
        .videos-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: center;
            margin-top: 5px;
        }

        /* Каждый видео-блок — в стиле "карточка" из оригинального файла */
        .video-card {
            flex: 1;
            min-width: 300px;
            max-width: 380px;
            background: #fff;
            border-radius: 16px;
            border: 1px solid #e8e8e8;
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .video-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
            border-color: #f0d9cc;
        }

        /* Заголовок внутри карточки — похож на .panel-title, но ярче */
        .video-title {
            background: #fffaf5;
            padding: 14px 18px;
            font-weight: 700;
            font-size: 1.1rem;
            color: #d95b00;
            border-bottom: 2px solid #d95b00;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .video-title::before {
            content: "▶";
            font-size: 0.9rem;
            color: #d95b00;
        }

        /* Обёртка плеера */
        .video-wrapper {
            background: #000;
            background-color: #0a0a0a;
            line-height: 0;
        }

        video {
            width: 100%;
            display: block;
            aspect-ratio: 16 / 9;
            object-fit: contain;
            cursor: pointer;
        }

        /* Адаптивность как в эталоне */
        @media (max-width: 700px) {
            .content {
                padding: 0 15px 20px 15px;
            }
            .bios-note {
                margin: 0 15px 15px 15px;
                padding: 10px 14px;
                font-size: 0.75rem;
            }
            .header {
                padding: 16px 20px;
            }
            .header h1 {
                font-size: 1.3rem;
            }
            .video-title {
                padding: 10px 14px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
<div class="card">
    <div class="header">
        <div class="header-icon">📺</div>
        <div>
            <h1>Видео по настройкам</h1>
        </div>
    </div>
    
    <!-- Новая подсказка: клавиши для входа в BIOS -->
    <div class="bios-note">
        <span>⚙️</span>
        <span><strong>Для выхода в BIOS</strong> используются клавиши <code>F2</code> или <code>Del</code> (ПК обычно), если не помогает — <code>F8</code>, <code>F9</code>, <code>F11</code>, <code>F12</code> (редко).</span>
    </div>

    <div class="content">
        <div class="videos-grid">
            <!-- БЛОК 1: Ноутбуки HUAWEI -->
            <div class="video-card">
                <div class="video-title">Ноутбуки HUAWEI</div>
                <div class="video-wrapper">
                    <video id="videoHuawei" preload="metadata" controls>
                        <!-- ⚠️ ЗАМЕНИТЕ ССЫЛКУ НА ВАШ ФАЙЛ НА GITHUB PAGES -->
                        <source src="huawei_notebooks.mp4" type="video/mp4">
                        Ваш браузер не поддерживает тег video.
                    </video>
                </div>
            </div>

            <!-- БЛОК 2: Ноутбуки MSI -->
            <div class="video-card">
                <div class="video-title">Ноутбуки MSI</div>
                <div class="video-wrapper">
                    <video id="videoMsi" preload="metadata" controls>
                        <source src="msi_notebooks.mp4" type="video/mp4">
                        Ваш браузер не поддерживает тег video.
                    </video>
                </div>
            </div>

            <!-- БЛОК 3: Установка ПО на ТВ -->
            <div class="video-card">
                <div class="video-title">Установка ПО на ТВ</div>
                <div class="video-wrapper">
                    <video id="videoTv" preload="metadata" controls>
                        <source src="tv_software_install.mp4" type="video/mp4">
                        Ваш браузер не поддерживает тег video.
                    </video>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Небольшой скрипт для обработки ошибок загрузки (в стиле оригинального файла, без лишнего текста) -->
<script>
    (function() {
        const videos = document.querySelectorAll('video');
        videos.forEach(video => {
            video.addEventListener('error', (e) => {
                const parentCard = video.closest('.video-card');
                const titleElem = parentCard ? parentCard.querySelector('.video-title') : null;
                const videoName = titleElem ? titleElem.innerText.trim() : 'Видео';
                console.warn(`⚠️ Ошибка загрузки: "${videoName}". Проверьте ссылку на видеофайл.`);
            });
        });
        console.log('Страница «Видео по настройкам» загружена. Добавлена подсказка про BIOS.');
    })();
</script>
</body>
</html>
